<!DOCTYPE html>
<html>
<head>
  <title>Light On/Off Switch</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      margin-top: 50px;
    }
    img {
      width: 200px;
      height: auto;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .on {
      background-color: green;
      color: white;
    }
    .off {
      background-color: red;
      color: white;
    }
  </style>
</head>
<body>

  <h1>💡 Light On/Off Switch</h1>
  
  <img id="lightBulb" src="https://www.w3schools.com/js/pic_bulboff.gif" alt="Light Bulb">
  
  <div>
    <button class="on" onclick="turnOn()">Switch On</button>
    <button class="off" onclick="turnOff()">Switch Off</button>
  </div>

  <script>
    function turnOn() {
      document.getElementById("lightBulb").src = "https://www.w3schools.com/js/pic_bulbon.gif";
    }
    function turnOff() {
      document.getElementById("lightBulb").src = "https://www.w3schools.com/js/pic_bulboff.gif";
    }
  </script>

</body>
</html>
